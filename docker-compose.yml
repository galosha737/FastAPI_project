volumes:
  postgres_data:

services:
  postgres:
    image: postgres:13.10
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./images:/images
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
    networks:
      - app_network
    # Перенес содерживмое start.sh 
    command: >
      sh -c "poetry run alembic upgrade head && poetry run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    
networks:
  app_network:

  