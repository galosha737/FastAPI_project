volumes:
  postgres_data:

services:
  postgres:
    image: postgres:13.10
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  init_db:
    build: .
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./alembic:/app/alembic
    networks:
      - app_network
    command: >
      sh -c "
        echo 'Running migrations...'
        poetry run alembic upgrade head
        echo 'Creating superuser...'
        poetry run python src/scripts/create_super_admin.py
        echo 'Initialization complete.'
      "

  app:
    build: .
    env_file:
      - .env
    depends_on:
      init_db:
        condition: service_completed_successfully
    volumes:
      - ./alembic:/app/alembic
      - ./src:/app/src
      - ./images:/app/images
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
    networks:
      - app_network
    # Перенес содерживмое start.sh 
    command: >
      sh -c "
        echo 'Starting Uvicorn server...'
        poetry run uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "
    
networks:
  app_network:

  